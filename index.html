<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Sign-Up Form</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="container">
        <img class="image" src="./images/aleksandr-zaitsev-cRS3WCABL18-unsplash.jpg" alt="Nature">
        <div class="main-container">
            <div class="para">
                <p>
                    This is not a real online service! You know you need something like this
                    in your life to help you realise your deepest dreams.
                    Sign up now to get started.
                </p>
                <p>You know you want to.</p>
            </div>
            <div class="form-container">
                <fieldset>
                    <legend>Let's do this!</legend>
                    <form id="login-form" method="post" novalidate>
                        <p class="name-container">
                            <div>
                                <p><label for="first-name">FIRST NAME</label></p>
                                <p><input type="text" name="first-name" id="first-name"></p>
                            </div>
                            <div>
                                <p><label for="last-name">LAST NAME</label></p>
                                <p><input type="text" name="last-name" id="last-name"></p>
                            </div>
                        </p>
                        <p class="email-container">
                            <div>
                                <p><label for="email">EMAIL</label></p>
                                <p><input type="email" name="email" id="email"></p>
                            </div>
                            <div>
                                <p><label for="tel">PHONE NUMBER</label></p>
                                <p><input type="tel" name="tel" id="tel"></p>
                            </div>
                        </p>
                        <p class="password-container">
                            <div>
                                <p><label for="password">PASSWORD</label></p>
                                <p><input type="password" name="password" id="password"></p>
                            </div>
                            <div>
                                <p><label for="confirm-pass">CONFIRM PASSWORD</label></p>
                                <p><input type="password" name="confirm-pass" id="confirm-pass"></p>
                            </div>
                        </p>
                    </form>
                </fieldset>
            </div>
            <div>
                <button type="submit">Create Account</button>
                <p class="signin-para">
                    Already have an account? <a href="">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
