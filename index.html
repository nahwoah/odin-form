<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Sign-Up Form</title>
    <link rel="stylesheet" href="style.css">
    <script src=""></script>
</head>
<body>
    <img src="/images/aleksandr-zaitsev-cRS3WCABL18-unsplash.jpg" alt="Nature">
    <p>
        This is not a real online service! You know you need something like this
        in your life to help you realise your deepest dreams.
        Sign up now to get started.
    </p>
    <p>You know you want to.</p>
    <fieldset>
        <legend>Let's do this!</legend>
        <form action="" method="post">
            <div>
                <label for="first-name">FIRST NAME</label>
                <input type="text" name="first-name" id="first-name">
            </div>
            <div>
                <label for="last-name">LAST NAME</label>
                <input type="text" name="last-name" id="last-name">
            </div>
            <div>
                <label for="email">EMAIL</label>
                <input type="email" name="email" id="email">
            </div>
            <div>
                <label for="tel">PHONE NUMBER</label>
                <input type="tel" name="tel" id="tel">
            </div>
            <div>
                <label for="password">PASSWORD</label>
                <input type="password" name="password" id="password">
            </div>
            <div>
                <label for="confirm-pass">CONFIRM PASSWORD</label>
                <input type="password" name="confirm-pass" id="confirm-pass">
            </div>
        </form>
    </fieldset>
</body>
</html>
